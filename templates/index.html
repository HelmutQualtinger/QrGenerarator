<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Contact Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QR Contact Generator</h1>
            <p>Convert your contact information into a shareable QR code</p>
        </div>

        <div class="content">
            <div class="form-section">
                <div class="form-card">
                    <h2>Contact Information</h2>
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone</label>
                            <input type="tel" id="phone" placeholder="+1 (555) 123-4567">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="organization">Organization</label>
                        <input type="text" id="organization" placeholder="Your Company">
                    </div>

                    <div class="form-group">
                        <label for="url">Website</label>
                        <input type="url" id="url" placeholder="https://example.com">
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" placeholder="123 Main St, City, State">
                    </div>

                    <h2 style="margin-top: 2rem;">QR Code Styling</h2>

                    <div class="form-group">
                        <label for="patternStyle">Pattern Style</label>
                        <select id="patternStyle">
                            <option value="standard" selected>Standard</option>
                            <option value="rounded">Rounded Dots</option>
                            <option value="diamond">Diamond</option>
                            <option value="dots">Tiny Dots</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="errorCorrection">Error Correction Level</label>
                        <select id="errorCorrection">
                            <option value="L">Low (7% recovery)</option>
                            <option value="M" selected>Medium (15% recovery)</option>
                            <option value="Q">Quartile (25% recovery)</option>
                            <option value="H">High (30% recovery)</option>
                        </select>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="colorTransition">
                        <label for="colorTransition">Enable Color Transition</label>
                    </div>

                    <div id="colorOptions" style="display: none;">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="darkColor">Dark Color</label>
                                <input type="color" id="darkColor" value="#000000">
                            </div>
                            <div class="form-group">
                                <label for="lightColor">Light Color</label>
                                <input type="color" id="lightColor" value="#FFFFFF">
                            </div>
                        </div>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="shadowEnabled">
                        <label for="shadowEnabled">Add Shadow Effect</label>
                    </div>

                    <div class="button-group">
                        <button id="generateBtn" class="btn btn-primary">Generate QR Code</button>
                        <button id="downloadBtn" class="btn btn-secondary" disabled>Download PNG</button>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <div class="preview-card">
                    <h2>Preview</h2>
                    <div id="previewContainer" class="preview-container">
                        <div class="preview-placeholder">
                            <p>Fill in the form and click "Generate QR Code" to see the preview</p>
                        </div>
                    </div>
                    <div id="loadingIndicator" class="loading" style="display: none;">
                        <div class="spinner"></div>
                        <p>Generating...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
